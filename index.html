<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="javascript.js"></script>
</head>
<body>
    <div class="container">
        <h1>Simple Interest Calculator</h1>
        <div class="input-group">
            <label for="principal">Principal Amount</label>
            <input type="number" placeholder="e.g 10,000" id="principal">
        </div>
        <div class="input-group">
            <label for="time">Duration</label>
            <input type="number" placeholder="e.g 2 years" id="duration">
        </div>
        <div class="input-group">
            <label for="rate">Rate</label>
            <input type="number" placeholder="e.g 3%" id="rate">
        </div>
        <button onclick=" calculateInterest()" id="click">Calculate Interest</button>
        <div id="interestBox">
            <h2 id="result">Your Interest will appear here</h2>
        </div>
        <div id="paymentBox">
            <h2 id="total">Your Payment will appear here</h2>
        </div>
    </div>
    
</body>
</html>
